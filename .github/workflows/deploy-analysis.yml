name: CI/CD - Build and Deploy Analysis Service

on:
  push:
    branches: [ main ]
    # Ensure this is matching your directory structure correctly
    paths:
      - 'automation/**'
      - '.github/workflows/deploy-analysis.yml'
  workflow_dispatch:

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    # Added outputs if needed, but for now we'll just use the successful completion
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # --- 1. TEST PHASE ---
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Deps for Testing
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr libgl1 libglib2.0-0 curl

      - name: Install Python Dependencies
        run: |
          pip install -r automation/requirements.txt
          pip install pytest

      - name: Run Smoke Test
        run: |
          # We need to run this from the automation/scripts directory
          cd automation/scripts
          python3 investigation_mode.py manual google.com

      # --- 2. DOCKER BUILD & PUSH PHASE ---
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: ./automation
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/cyber-saathi-analysis:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/cyber-saathi-analysis:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    # This ensures the deploy job only runs if test-and-build succeeds
    needs: test-and-build
    steps:
      - name: Trigger Render Deployment
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
